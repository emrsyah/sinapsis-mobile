name: sinapsis_mobile
description: Sinapsis — Academic note-taking mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  flutter_dotenv: ^5.1.0
  go_router: ^17.1.0
  dio: ^5.8.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutter_quill: ^11.0.0
  shared_preferences: ^2.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  image_picker: ^1.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  freezed: ^3.2.3
  json_serializable: ^6.9.0
  riverpod_generator: ^4.0.0+1

flutter:
  uses-material-design: true